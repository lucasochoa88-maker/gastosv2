<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de gastos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e8e8e8; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

.header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 12px; }
.header-left h1 { font-size: 22px; font-weight: 500; color: #fff; margin-bottom: 4px; }
.header-left p { font-size: 13px; color: #555; }
.header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

.dropdown-wrap { position: relative; }
.dropdown-btn { background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 8px; padding: 8px 16px; font-size: 13px; color: #ccc; cursor: pointer; display: flex; align-items: center; gap: 8px; min-width: 175px; }
.dropdown-btn:hover { border-color: #444; background: #222; }
.dropdown-chevron { margin-left: auto; color: #555; font-size: 11px; transition: transform 0.15s; }
.dropdown-chevron.open { transform: rotate(180deg); }
.dropdown-menu { position: absolute; top: calc(100% + 6px); right: 0; background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 10px; overflow: hidden; z-index: 100; min-width: 190px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); display: none; }
.dropdown-menu.open { display: block; }
.dropdown-group-label { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 0.08em; padding: 10px 14px 4px; }
.dropdown-item { padding: 9px 14px; font-size: 13px; color: #888; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 8px; }
.dropdown-item:hover { background: #222; color: #ccc; }
.dropdown-item.active { color: #fff; background: #252525; }
.dropdown-item .dot { width: 6px; height: 6px; border-radius: 50%; background: #378ADD; flex-shrink: 0; opacity: 0; }
.dropdown-item.active .dot { opacity: 1; }

.btn-refresh { background: transparent; border: 0.5px solid #2a2a2a; border-radius: 8px; padding: 8px 12px; font-size: 15px; color: #666; cursor: pointer; transition: all 0.15s; }
.btn-refresh:hover { color: #ccc; border-color: #444; background: #1a1a1a; }

.ciclo-badge { font-size: 11px; color: #555; background: #1a1a1a; border: 0.5px solid #222; border-radius: 6px; padding: 4px 10px; white-space: nowrap; }

.tabs { display: flex; background: #1a1a1a; border: 0.5px solid #222; border-radius: 10px; padding: 3px; margin-bottom: 1.5rem; gap: 2px; }
.tab { flex: 1; padding: 8px 12px; font-size: 12px; color: #555; background: transparent; border: none; cursor: pointer; border-radius: 8px; transition: all 0.15s; text-align: center; letter-spacing: 0.02em; }
.tab:hover { color: #aaa; }
.tab.active { color: #fff; background: #2a2a2a; }

.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.metric { background: #1a1a1a; border: 0.5px solid #222; border-radius: 8px; padding: 14px 16px; }
.metric-label { font-size: 10px; color: #444; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
.metric-value { font-size: 17px; font-weight: 500; color: #e8e8e8; }
.metric-value.danger { color: #E24B4A; }
.metric-value.success { color: #639922; }

.proj-banner { background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 8px; padding: 12px 16px; margin-bottom: 1.5rem; display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
.proj-banner.saving  { border-left: 2px solid #1D9E75; }
.proj-banner.warning { border-left: 2px solid #EF9F27; }
.proj-banner.danger  { border-left: 2px solid #E24B4A; }
.proj-banner-content { flex: 1; }
.proj-banner-title { font-size: 10px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
.proj-banner.saving  .proj-banner-title { color: #1D9E75; }
.proj-banner.warning .proj-banner-title { color: #EF9F27; }
.proj-banner.danger  .proj-banner-title { color: #E24B4A; }
.proj-banner-body { font-size: 13px; color: #888; line-height: 1.6; }
.proj-banner-body strong { color: #e8e8e8; font-weight: 500; }

.ciclo-progress { background: #1a1a1a; border: 0.5px solid #222; border-radius: 8px; padding: 14px 16px; margin-bottom: 1.5rem; }
.ciclo-progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.ciclo-progress-label { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 0.06em; }
.ciclo-progress-pct { font-size: 12px; color: #666; }
.progress-track { background: #222; border-radius: 4px; height: 6px; position: relative; overflow: hidden; }
.progress-fill-gastos { height: 6px; border-radius: 4px; background: #E24B4A; position: absolute; left: 0; top: 0; transition: width 0.4s; }
.progress-fill-tiempo { height: 6px; border-radius: 4px; background: #378ADD22; position: absolute; left: 0; top: 0; border-right: 1.5px solid #378ADD; }

.charts { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1.5rem; }
.chart-card { background: #1a1a1a; border: 0.5px solid #222; border-radius: 12px; padding: 1.25rem; }
.chart-card-full { background: #1a1a1a; border: 0.5px solid #222; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
.chart-title { font-size: 10px; font-weight: 500; color: #444; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.07em; }
.legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

.table-card { background: #1a1a1a; border: 0.5px solid #222; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
.ranking-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.ranking-table tr { border-bottom: 0.5px solid #1e1e1e; }
.ranking-table tr:last-child { border-bottom: none; }
.ranking-table th { padding: 8px 4px; color: #444; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; text-align: left; font-weight: 500; }
.ranking-table td { padding: 8px 4px; color: #e8e8e8; vertical-align: middle; }
.ranking-table td:first-child { color: #333; width: 22px; font-size: 12px; }
.ranking-table td:last-child { text-align: right; font-weight: 500; white-space: nowrap; }
.bar-bg { background: #222; border-radius: 3px; height: 3px; margin-top: 5px; }
.bar-fill { height: 3px; border-radius: 3px; }
.pct-label { font-size: 11px; color: #555; font-weight: 400; }

.badge-user { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; display: inline-block; text-transform: capitalize; }
.badge-lucas { background: rgba(55,138,221,0.15); color: #378ADD; }
.badge-mariana { background: rgba(212,83,126,0.15); color: #D4537E; }
.badge-desconocido { background: #222; color: #888; }
.cat-tag { background: #222; padding: 3px 8px; border-radius: 4px; font-size: 11px; color: #aaa; white-space: nowrap; }

.loading { text-align: center; padding: 3rem 0; color: #444; font-size: 14px; }
.error-msg { background: #2a1010; color: #E24B4A; border: 0.5px solid #3a1515; border-radius: 8px; padding: 12px 16px; font-size: 13px; margin-bottom: 1rem; }

/* ── MULTISELECT FILTERS ── */
.filter-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.filter-pill { background: transparent; border: 0.5px solid #2a2a2a; border-radius: 6px; padding: 5px 10px; font-size: 11px; color: #555; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
.filter-pill:hover { border-color: #444; color: #ccc; background: #141414; }
.filter-pill.active { background: #1a1a1a; color: #fff; border-color: #555; }
.filter-pill .pill-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }

/* ── TARJETAS ── */
.tc-seccion-titulo { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; margin-top: 1.5rem; }

.tc-cuotas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-bottom: 1.5rem; }
.tc-cuota-mes { background: #1a1a1a; border: 0.5px solid #222; border-radius: 8px; padding: 12px 14px; }
.tc-cuota-mes-label { font-size: 10px; color: #555; margin-bottom: 6px; }
.tc-cuota-mes-ars { font-size: 16px; font-weight: 500; color: #e8e8e8; }
.tc-cuota-mes-usd { font-size: 11px; color: #1D9E75; margin-top: 2px; }
.tc-cuota-mes.actual { border-color: #378ADD44; background: #1a2030; }
.tc-cuota-mes.actual .tc-cuota-mes-label { color: #378ADD; }

.tc-tarjeta-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.cuota-tag { background: #252525; color: #888; padding: 2px 7px; border-radius: 4px; font-size: 11px; white-space: nowrap; }
.cuota-tag.en-curso { background: #1a2535; color: #378ADD; }

@media (max-width: 540px) {
  .charts { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-left">
      <h1>Gastos personales</h1>
      <p id="dashSub">Cargando...</p>
    </div>
    <div class="header-right">
      <span class="ciclo-badge" id="cicloBadge">Ciclo: —</span>
      <div class="dropdown-wrap" id="dropdownWrap">
        <button class="dropdown-btn" id="dropdownBtn" onclick="toggleDropdown()">
          <span id="dropdownLabel">Cargando...</span>
          <span class="dropdown-chevron" id="dropdownChevron">▼</span>
        </button>
        <div class="dropdown-menu" id="dropdownMenu"></div>
      </div>
      <button class="btn-refresh" onclick="loadData()" title="Actualizar">↻</button>
    </div>
  </div>

  <div id="errorBox" style="display:none;" class="error-msg"></div>

  <div class="tabs">
    <button class="tab active" onclick="setTab('mes', this)">Este ciclo</button>
    <button class="tab" onclick="setTab('comparativa', this)">Comparativa</button>
    <button class="tab" onclick="setTab('detalle', this)">Detalle</button>
    <button class="tab" onclick="setTab('tarjetas', this)">Tarjetas</button>
  </div>

  <div id="loadingBox" class="loading">Conectando con Google Sheets...</div>

  <div id="tabMes" style="display:none;">
    <div id="cicloProgressWrap" class="ciclo-progress" style="display:none;">
      <div class="ciclo-progress-header">
        <span class="ciclo-progress-label">Avance del ciclo</span>
        <span class="ciclo-progress-pct" id="cicloProgressPct"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill-tiempo" id="progressTiempo" style="width:0%"></div>
        <div class="progress-fill-gastos" id="progressGastos" style="width:0%"></div>
      </div>
      <div style="margin-top:8px; font-size:11px; color:#555;" id="cicloLegendText"></div>
    </div>

    <div id="projBanner" class="proj-banner" style="display:none;">
      <div class="proj-banner-content">
        <p class="proj-banner-title" id="projBannerTitle"></p>
        <p class="proj-banner-body" id="projText"></p>
      </div>
    </div>

    <div class="metrics" id="metricsBox"></div>

    <div class="charts">
      <div class="chart-card">
        <p class="chart-title">Por categoría</p>
        <div style="position:relative; height:190px;"><canvas id="donutChart"></canvas></div>
        <div class="legend" id="donutLegend"></div>
      </div>
      <div class="chart-card">
        <p class="chart-title">Gastos por fecha</p>
        <div style="position:relative; height:190px;"><canvas id="barChart"></canvas></div>
      </div>
    </div>

    <div class="table-card">
      <p class="chart-title">Ranking de categorías</p>
      <table class="ranking-table" id="rankingTable"></table>
    </div>
  </div>

  <div id="tabComparativa" style="display:none;">
    <div class="chart-card-full">
      <p class="chart-title">Total de gastos por ciclo</p>
      <div style="position:relative; height:220px;"><canvas id="compareBarChart"></canvas></div>
    </div>
    <div class="charts">
      <div class="chart-card">
        <p class="chart-title">% gastado del ingreso</p>
        <div style="position:relative; height:180px;"><canvas id="ratioLineChart"></canvas></div>
      </div>
      <div class="chart-card">
        <p class="chart-title">Top categorías por ciclo</p>
        <div style="position:relative; height:180px;"><canvas id="catCompareChart"></canvas></div>
        <div class="legend" id="catCompareLegend"></div>
      </div>
    </div>
    <div class="table-card">
      <p class="chart-title">Resumen comparativo</p>
      <table class="ranking-table" id="compareTable"></table>
    </div>
  </div>

  <div id="tabDetalle" style="display:none;">
    <div class="table-card">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px;">
        <p class="chart-title" style="margin-bottom:0;">Registro de gastos</p>
        <input type="text" id="searchInput" placeholder="Buscar..." onkeyup="filtrarLog()"
          style="background:#111; border:0.5px solid #2a2a2a; border-radius:6px; padding:6px 10px; font-size:12px; color:#ccc; outline:none; width:160px;">
      </div>
      <div style="overflow-x:auto;">
        <table class="ranking-table" id="logTable" style="width:100%; min-width:560px;"></table>
      </div>
    </div>
  </div>

  <div id="tabTarjetas" style="display:none;">
    <div class="chart-card-full">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:12px;">
        <p class="chart-title" style="margin-bottom:0;">Evolución de Gastos de Tarjetas</p>
        <div id="tarjetasFilterWrap" class="filter-wrap"></div>
      </div>
      <div style="position:relative; height:260px;">
        <canvas id="tarjetasLineChart"></canvas>
      </div>
    </div>
    
    <div id="tcCuotasPendientes"></div>
    <div id="tcDetalle"></div>
  </div>

</div>

<script>
// ─── CONFIGURACIÓN ────────────────────────────────────────────────────────────
const CICLOS = [
  {
    label: 'Ciclo Junio 2026',
    cicloDesde: new Date(2026, 4, 25),
    cicloHasta: new Date(2026, 5, 24),
    url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSR-jEHWGJNTU5Wk2HOm6U5_pQkHudAuzgL46QYnVg5WNv-2K9H8hDsNVGUtFifICuhdcCzBWich3V/pub?gid=1978138079&single=true&output=csv'
  },
  {
    label: 'Ciclo Julio 2026',
    cicloDesde: new Date(2026, 5, 25),
    cicloHasta: new Date(2026, 6, 24),
    url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSR-jEHWGJNTU5Wk2HOm6U5_pQkHudAuzgL46QYnVg5WNv-2K9H8hDsNVGUtFifICuhdcCzBWich3V/pub?gid=815384903&single=true&output=csv'
  }
];

const URL_TARJETAS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSR-jEHWGJNTU5Wk2HOm6U5_pQkHudAuzgL46QYnVg5WNv-2K9H8hDsNVGUtFifICuhdcCzBWich3V/pub?gid=1050964641&single=true&output=csv';

const PALETTE = ['#378ADD','#1D9E75','#EF9F27','#7F77DD','#D4537E','#D85A30','#639922','#888780'];
const GRID = 'rgba(255,255,255,0.05)';
const TICK = '#444';

let cicloActivo = CICLOS.length - 1;
let tabActivo = 'mes';
let datosCache = {};
let tarjetasCache = null;
let logDatos = [];
let activeTarjetasMetrics = ['Total ARS', 'Total USD']; // Estado inicial multiselect
let donutInst = null, barInst = null, compareBarInst = null, ratioLineInst = null, catCompareInst = null, tarjetasLineInst = null;

// ─── UTILIDADES ───────────────────────────────────────────────────────────────
function fmt(n) {
  return '$' + Math.round(n).toLocaleString('es-AR');
}
function fmtUSD(n) {
  return 'U$S ' + n.toFixed(2).replace('.', ',');
}
function parseMonto(s) {
  if (!s) return 0;
  let str = s.toString().trim().replace(/\$/g, '').replace(/\s/g, '');
  const tieneComaDecimal = /,\d{1,2}$/.test(str);
  if (tieneComaDecimal) str = str.replace(/\./g, '').replace(',', '.');
  else str = str.replace(/,/g, '');
  return parseFloat(str) || 0;
}
function parseDate(s) {
  if (!s) return null;
  const p = s.trim().split('/');
  if (p.length === 3) return new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
  return null;
}
function formatDateShort(d) {
  if (!d) return '';
  return d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit' });
}
function formatDateMed(d) {
  if (!d) return '';
  return d.toLocaleDateString('es-AR', { day: '2-digit', month: 'short', year: 'numeric' });
}
function diasEntre(desde, hasta) {
  return Math.round((hasta - desde) / (1000 * 60 * 60 * 24)) + 1;
}
function mesLabel(d) {
  if (!d) return '';
  return d.toLocaleDateString('es-AR', { month: 'short', year: '2-digit' })
          .replace('. ', '/').replace('.', '/');
}
function addMonths(d, n) {
  const r = new Date(d);
  r.setMonth(r.getMonth() + n);
  return r;
}

// ─── DROPDOWN ─────────────────────────────────────────────────────────────────
function buildDropdown() {
  const menu = document.getElementById('dropdownMenu');
  const byAnio = {};
  CICLOS.forEach((c, i) => {
    const anio = c.cicloHasta.getFullYear();
    if (!byAnio[anio]) byAnio[anio] = [];
    byAnio[anio].push({ ...c, idx: i });
  });
  let html = '';
  Object.keys(byAnio).sort((a,b) => b - a).forEach(anio => {
    html += `<div class="dropdown-group-label">${anio}</div>`;
    [...byAnio[anio]].reverse().forEach(c => {
      const shortLabel = c.label.replace(' ' + anio, '').replace('Ciclo ','');
      html += `<div class="dropdown-item ${c.idx === cicloActivo ? 'active' : ''}" onclick="cambiarCiclo(${c.idx})">
        <span class="dot"></span>${shortLabel}</div>`;
    });
  });
  menu.innerHTML = html;
  document.getElementById('dropdownLabel').textContent = CICLOS[cicloActivo].label;
}
function toggleDropdown() {
  const menu = document.getElementById('dropdownMenu');
  const chev = document.getElementById('dropdownChevron');
  const open = menu.classList.toggle('open');
  chev.classList.toggle('open', open);
}
document.addEventListener('click', e => {
  if (!document.getElementById('dropdownWrap').contains(e.target)) {
    document.getElementById('dropdownMenu').classList.remove('open');
    document.getElementById('dropdownChevron').classList.remove('open');
  }
});
function cambiarCiclo(idx) {
  cicloActivo = idx;
  buildDropdown();
  document.getElementById('dropdownMenu').classList.remove('open');
  document.getElementById('dropdownChevron').classList.remove('open');
  loadData();
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function setTab(tab, el) {
  tabActivo = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  ['tabMes','tabComparativa','tabDetalle','tabTarjetas'].forEach(id => document.getElementById(id).style.display = 'none');
  if (tab === 'mes')         document.getElementById('tabMes').style.display = 'block';
  if (tab === 'comparativa') { document.getElementById('tabComparativa').style.display = 'block'; renderComparativa(); }
  if (tab === 'detalle')     document.getElementById('tabDetalle').style.display = 'block';
  if (tab === 'tarjetas')    { document.getElementById('tabTarjetas').style.display = 'block'; renderTarjetas(); }
}

// ─── CARGA DE DATOS ───────────────────────────────────────────────────────────
function loadData() {
  document.getElementById('loadingBox').style.display = 'block';
  document.getElementById('errorBox').style.display = 'none';
  ['tabMes','tabComparativa','tabDetalle','tabTarjetas'].forEach(id => document.getElementById(id).style.display = 'none');
  tarjetasCache = null;

  const fetchCiclo = (c, i) => new Promise((resolve, reject) => {
    if (datosCache[i]) { resolve(datosCache[i]); return; }
    Papa.parse(c.url, {
      download: true, header: true, skipEmptyLines: true,
      complete: r => { datosCache[i] = r.data; resolve(r.data); },
      error: reject
    });
  });

  const fetchTarjetas = new Promise((resolve) => {
    Papa.parse(URL_TARJETAS, {
      download: true, header: true, skipEmptyLines: true,
      complete: r => { tarjetasCache = r.data; resolve(r.data); },
      error: () => resolve([])
    });
  });

  Promise.all([
    ...CICLOS.map((c, i) => fetchCiclo(c, i).catch(() => null)),
    fetchTarjetas
  ]).then(results => {
    results.slice(0, CICLOS.length).forEach((r, i) => { if (r) datosCache[i] = r; });
    if (!datosCache[cicloActivo]) {
      document.getElementById('loadingBox').style.display = 'none';
      document.getElementById('errorBox').textContent = 'No se pudo cargar el ciclo seleccionado.';
      document.getElementById('errorBox').style.display = 'block';
      return;
    }
    buildDashboard(datosCache[cicloActivo]);
  });
}

// ─── PARSEO DE GASTOS ────────────────────────────────────────────────────────
function parsearCiclo(rows) {
  if (!rows || rows.length === 0) return null;
  const cols = Object.keys(rows[0]);
  const colFecha = cols[0], colDetalle = cols[1], colCat = cols[2], colMonto = cols[3], colQuien = cols[4];
  let ingresosLucas = 0, ingresosMari = 0;
  const datos = [];
  rows.forEach(r => {
    const fecha  = r[colFecha]   ? r[colFecha].trim()   : '';
    const cat    = r[colCat]     ? r[colCat].trim()     : '';
    const monto  = parseMonto(r[colMonto]);
    const det    = r[colDetalle] ? r[colDetalle].trim() : '';
    const quien  = r[colQuien]   ? r[colQuien].trim()   : 'Desconocido';
    const dL = det.toLowerCase();
    if (dL.includes('ingres. lucas'))   { ingresosLucas = monto; return; }
    if (dL.includes('ingres. mariana')) { ingresosMari  = monto; return; }
    if (!fecha || !cat || monto <= 0) return;
    datos.push({ fecha, detalle: det, categoria: cat, monto, quien });
  });
  return { datos, ingresosLucas, ingresosMari };
}

// ─── PARSEO DE TARJETAS ──────────────────────────────────────────────────────
function parsearTarjetas(rows) {
  if (!rows || rows.length === 0) return [];
  const cols = Object.keys(rows[0]);
  // Columnas esperadas estándar
  const [cFecha, cTarjeta, cDetalle, cCuota, cARS, cUSD, cVenc] = cols;
  
  // Mapeo dinámico para columnas J (index 9) y K (index 10)
  const cTotalARS = cols[9] || null;
  const cTotalUSD = cols[10] || null;

  const datos = [];
  rows.forEach(r => {
    const fecha     = r[cFecha]   ? r[cFecha].trim()   : '';
    const tarjeta   = r[cTarjeta] ? r[cTarjeta].trim() : '';
    const detalle   = r[cDetalle] ? r[cDetalle].trim() : '';
    const cuota     = r[cCuota]   ? r[cCuota].trim()   : '';
    const montoARS  = parseMonto(r[cARS]);
    const montoUSD  = parseMonto(r[cUSD]);
    const vencStr   = r[cVenc]    ? r[cVenc].trim()    : '';
    
    // Captura de valores de columnas J y K
    const colJTotalARS = cTotalARS ? parseMonto(r[cTotalARS]) : 0;
    const colKTotalUSD = cTotalUSD ? parseMonto(r[cTotalUSD]) : 0;

    if (!fecha || !tarjeta) return;
    const fechaDate = parseDate(fecha);
    const vencDate  = parseDate(vencStr);
    
    let cuotaActual = 0, cuotaTotal = 0;
    if (cuota && cuota.includes('/')) {
      const parts = cuota.split('/');
      cuotaActual = parseInt(parts[0]) || 0;
      cuotaTotal  = parseInt(parts[1]) || 0;
    }
    datos.push({ 
      fecha, fechaDate, tarjeta, detalle, cuota, cuotaActual, cuotaTotal, 
      montoARS, montoUSD, vencStr, vencDate, colJTotalARS, colKTotalUSD 
    });
  });
  return datos;
}

// ─── CONSTRUCCIÓN DEL DASHBOARD ───────────────────────────────────────────────
function buildDashboard(rows) {
  const parsed = parsearCiclo(rows);
  const { datos, ingresosLucas, ingresosMari } = parsed;
  logDatos = [...datos].sort((a,b) => {
    const da = parseDate(a.fecha), db = parseDate(b.fecha);
    return (!da || !db) ? 0 : db - da;
  });

  const ciclo = CICLOS[cicloActivo];
  const hoy   = new Date(); hoy.setHours(0,0,0,0);
  const desde = ciclo.cicloDesde;
  const hasta = ciclo.cicloHasta;

  const totalDiasCiclo    = diasEntre(desde, hasta);
  const esCicloActual     = hoy >= desde && hoy <= hasta;
  const diasTranscurridos = esCicloActual ? diasEntre(desde, hoy) : (hoy > hasta ? totalDiasCiclo : 0);
  const pctTiempo         = Math.min(100, (diasTranscurridos / totalDiasCiclo) * 100);

  const totalGastos   = datos.reduce((s, r) => s + r.monto, 0);
  const totalIngresos = ingresosLucas + ingresosMari;
  const resto         = totalIngresos - totalGastos;
  const pctGastado    = totalIngresos > 0 ? ((totalGastos / totalIngresos) * 100).toFixed(1) : '0.0';

  document.getElementById('cicloBadge').textContent = `${formatDateShort(desde)} – ${formatDateShort(hasta)}`;
  document.getElementById('dashSub').textContent = `${datos.length} movimientos · ${ciclo.label}`;

  const pctGastadoNum = totalIngresos > 0 ? (totalGastos / totalIngresos) * 100 : 0;
  document.getElementById('progressTiempo').style.width = pctTiempo.toFixed(1) + '%';
  document.getElementById('progressGastos').style.width = Math.min(100, pctGastadoNum).toFixed(1) + '%';
  document.getElementById('cicloProgressPct').textContent = `Día ${diasTranscurridos} de ${totalDiasCiclo}`;
  document.getElementById('cicloLegendText').innerHTML =
    `<span style="color:#E24B4A">■</span> Gastos: ${pctGastado}% del ingreso &nbsp;·&nbsp; `+
    `<span style="color:#378ADD">▏</span> Tiempo transcurrido: ${pctTiempo.toFixed(0)}%`;
  document.getElementById('cicloProgressWrap').style.display = esCicloActual || hoy > hasta ? 'block' : 'none';

  const banner = document.getElementById('projBanner');
  if (esCicloActual && diasTranscurridos > 0 && totalGastos > 0 && totalIngresos > 0) {
    const promDiario    = totalGastos / diasTranscurridos;
    const gastoProy     = promDiario * totalDiasCiclo;
    const ahorroProy    = totalIngresos - gastoProy;
    const pctAhorroProy = ((ahorroProy / totalIngresos) * 100).toFixed(1);
    const diasRestan    = totalDiasCiclo - diasTranscurridos;
    let tono, titulo, texto;
    if (ahorroProy >= totalIngresos * 0.20) {
      tono = 'saving'; titulo = 'Van muy bien 🎯';
      texto = `Al ritmo actual (<strong>${fmt(Math.round(promDiario))}/día</strong>), cerrarían el ciclo ahorrando <strong>${fmt(Math.round(ahorroProy))}</strong> — el <strong>${pctAhorroProy}%</strong> del ingreso. Quedan ${diasRestan} días: si mantienen el ritmo, ese ahorro está asegurado.`;
    } else if (ahorroProy > 0) {
      tono = 'warning'; titulo = 'Ahorro proyectado ajustado';
      texto = `Al ritmo actual (<strong>${fmt(Math.round(promDiario))}/día</strong>), cerrarían ahorrando <strong>${fmt(Math.round(ahorroProy))}</strong> (<strong>${pctAhorroProy}%</strong> del ingreso). Quedan ${diasRestan} días para ampliar ese margen.`;
    } else {
      const deficit = Math.abs(ahorroProy);
      tono = 'danger'; titulo = 'Ritmo por encima del ingreso';
      texto = `Al ritmo actual (<strong>${fmt(Math.round(promDiario))}/día</strong>), el ciclo cerraría con un déficit de <strong>${fmt(Math.round(deficit))}</strong>. Quedan ${diasRestan} días para revertirlo.`;
    }
    banner.className = `proj-banner ${tono}`;
    document.getElementById('projBannerTitle').textContent = titulo;
    document.getElementById('projText').innerHTML = texto;
    banner.style.display = 'flex';
  } else {
    banner.style.display = 'none';
  }

  document.getElementById('metricsBox').innerHTML = `
    <div class="metric"><p class="metric-label">Lucas</p><p class="metric-value">${fmt(ingresosLucas)}</p></div>
    <div class="metric"><p class="metric-label">Mariana</p><p class="metric-value">${fmt(ingresosMari)}</p></div>
    <div class="metric"><p class="metric-label">Total ingresos</p><p class="metric-value">${fmt(totalIngresos)}</p></div>
    <div class="metric"><p class="metric-label">Total gastos</p><p class="metric-value danger">${fmt(totalGastos)}</p></div>
    <div class="metric"><p class="metric-label">Saldo</p><p class="metric-value ${resto >= 0 ? 'success' : 'danger'}">${fmt(resto)}</p></div>
    <div class="metric"><p class="metric-label">% gastado</p><p class="metric-value">${pctGastado}%</p></div>
  `;

  const fechasSorted = [...new Set(datos.map(r => r.fecha))].sort((a,b) => {
    const da = parseDate(a), db = parseDate(b);
    return (!da || !db) ? 0 : da - db;
  });
  const montosPorFecha = fechasSorted.map(f =>
    datos.filter(r => r.fecha === f).reduce((s, r) => s + r.monto, 0)
  );

  const catMap = {};
  datos.forEach(r => { catMap[r.categoria] = (catMap[r.categoria] || 0) + r.monto; });
  const categorias = Object.entries(catMap)
    .sort((a,b) => b[1] - a[1])
    .map(([nombre, monto], i) => ({ nombre, monto, color: PALETTE[i % PALETTE.length] }));

  if (donutInst) donutInst.destroy();
  donutInst = new Chart(document.getElementById('donutChart'), {
    type: 'doughnut',
    data: { labels: categorias.map(c => c.nombre), datasets: [{ data: categorias.map(c => c.monto), backgroundColor: categorias.map(c => c.color), borderWidth: 2, borderColor: '#111' }] },
    options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${fmt(ctx.raw)} (${totalGastos > 0 ? ((ctx.raw/totalGastos)*100).toFixed(1) : 0}%)` } } } }
  });
  document.getElementById('donutLegend').innerHTML = categorias.slice(0, 6).map(c =>
    `<span class="legend-item"><span class="legend-dot" style="background:${c.color}"></span>${c.nombre.split(' ')[0]} ${totalGastos > 0 ? ((c.monto/totalGastos)*100).toFixed(1) : 0}%</span>`
  ).join('');

  if (barInst) barInst.destroy();
  barInst = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: { labels: fechasSorted, datasets: [{ data: montosPorFecha, backgroundColor: '#378ADD33', borderColor: '#378ADD', borderWidth: 1.5, borderRadius: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: GRID }, ticks: { color: TICK, font: { size: 10 }, maxRotation: 45, autoSkip: true, maxTicksLimit: 8 } }, y: { grid: { color: GRID }, ticks: { color: TICK, font: { size: 10 }, callback: v => '$' + (v >= 1000 ? Math.round(v/1000) + 'k' : v) } } } }
  });

  document.getElementById('rankingTable').innerHTML = categorias.map((c, i) => {
    const pct = totalGastos > 0 ? ((c.monto / totalGastos) * 100).toFixed(1) : '0.0';
    return `<tr><td>${i+1}</td><td>${c.nombre}<div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${c.color};"></div></div></td><td>${fmt(c.monto)}<br><span class="pct-label">${pct}%</span></td></tr>`;
  }).join('');

  renderLog(logDatos);

  document.getElementById('loadingBox').style.display = 'none';
  document.getElementById('tabMes').style.display = 'block';
  if (tabActivo === 'comparativa') renderComparativa();
  if (tabActivo === 'detalle') document.getElementById('tabDetalle').style.display = 'block';
  if (tabActivo === 'tarjetas') { document.getElementById('tabTarjetas').style.display = 'block'; renderTarjetas(); }
}

// ─── ACCIÓN INTERACTIVA MULTISELECT (TARJETAS) ──────────────────────────────
function toggleTarjetaMetric(metricId) {
  const idx = activeTarjetasMetrics.indexOf(metricId);
  if (idx > -1) {
    activeTarjetasMetrics.splice(idx, 1);
  } else {
    activeTarjetasMetrics.push(metricId);
  }
  renderTarjetas();
}

// ─── TARJETAS ────────────────────────────────────────────────────────────────
function renderTarjetas() {
  const datos = parsearTarjetas(tarjetasCache || []);
  const hoy = new Date(); hoy.setHours(0,0,0,0);

  if (!datos.length) {
    document.getElementById('tarjetasFilterWrap').innerHTML = '';
    document.getElementById('tcCuotasPendientes').innerHTML = '<p style="color:#444;font-size:13px;padding:2rem 0;">No hay datos de tarjetas cargados todavía.</p>';
    document.getElementById('tcDetalle').innerHTML = '';
    return;
  }

  const tarjetasUnicas = [...new Set(datos.map(d => d.tarjeta))];
  const colorMap = {};
  tarjetasUnicas.forEach((t, i) => { colorMap[t] = PALETTE[(i + 2) % PALETTE.length]; });

  // ── 1. PROCESAR HISTORIAL HISTÓRICO POR MESES (Para el gráfico) ──
  const mesesMap = {};
  datos.forEach(d => {
    if (!d.fechaDate) return;
    const key = `${d.fechaDate.getFullYear()}-${String(d.fechaDate.getMonth() + 1).padStart(2, '0')}`;
    if (!mesesMap[key]) {
      mesesMap[key] = {
        label: mesLabel(d.fechaDate),
        totalARS: 0,
        totalUSD: 0,
        cards: {}
      };
    }
    // Suma las columnas J y K directas de la fila
    mesesMap[key].totalARS += d.colJTotalARS;
    mesesMap[key].totalUSD += d.colKTotalUSD;

    if (!mesesMap[key].cards[d.tarjeta]) mesesMap[key].cards[d.tarjeta] = 0;
    mesesMap[key].cards[d.tarjeta] += d.montoARS; 
  });

  const mesesKeys = Object.keys(mesesMap).sort();

  // ── 2. CONSTRUIR UI FILTROS (MULTISELECT) ──
  let pillsHTML = '';
  // Píldora Total ARS (Col J)
  let activeARS = activeTarjetasMetrics.includes('Total ARS') ? 'active' : '';
  pillsHTML += `<button class="filter-pill ${activeARS}" onclick="toggleTarjetaMetric('Total ARS')"><span class="pill-dot" style="background:#3b82f6"></span>Total ARS</button>`;
  
  // Píldora Total USD (Col K)
  let activeUSD = activeTarjetasMetrics.includes('Total USD') ? 'active' : '';
  pillsHTML += `<button class="filter-pill ${activeUSD}" onclick="toggleTarjetaMetric('Total USD')"><span class="pill-dot" style="background:#10b981"></span>Total USD</button>`;
  
  // Píldoras de Tarjetas Individuales
  tarjetasUnicas.forEach(t => {
    let activeCard = activeTarjetasMetrics.includes(t) ? 'active' : '';
    pillsHTML += `<button class="filter-pill ${activeCard}" onclick="toggleTarjetaMetric('${t}')"><span class="pill-dot" style="background:${colorMap[t]}"></span>${t}</button>`;
  });
  document.getElementById('tarjetasFilterWrap').innerHTML = pillsHTML;

  // ── 3. ARMAR JUEGO DE DATOS SELECCIONADOS ──
  const datasets = [];
  if (activeTarjetasMetrics.includes('Total ARS')) {
    datasets.push({
      label: 'Total Gastos ARS',
      data: mesesKeys.map(k => mesesMap[k].totalARS),
      borderColor: '#3b82f6',
      backgroundColor: 'transparent',
      borderWidth: 2,
      tension: 0.2,
      pointRadius: 4
    });
  }
  if (activeTarjetasMetrics.includes('Total USD')) {
    datasets.push({
      label: 'Total Gastos USD',
      data: mesesKeys.map(k => mesesMap[k].totalUSD),
      borderColor: '#10b981',
      backgroundColor: 'transparent',
      borderWidth: 2,
      tension: 0.2,
      pointRadius: 4
    });
  }
  tarjetasUnicas.forEach(t => {
    if (activeTarjetasMetrics.includes(t)) {
      datasets.push({
        label: t,
        data: mesesKeys.map(k => mesesMap[k].cards[t] || 0),
        borderColor: colorMap[t],
        backgroundColor: 'transparent',
        borderWidth: 2,
        tension: 0.2,
        pointRadius: 4
      });
    }
  });

  // Render o Actualización del Gráfico de Líneas
  const ctx = document.getElementById('tarjetasLineChart').getContext('2d');
  if (tarjetasLineInst) tarjetasLineInst.destroy();
  tarjetasLineInst = new Chart(ctx, {
    type: 'line',
    data: { labels: mesesKeys.map(k => mesesMap[k].label), datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.dataset.label.includes('USD') ? 'U$S ' + ctx.raw.toFixed(2) : '$' + Math.round(ctx.raw).toLocaleString('es-AR')}`
          }
        }
      },
      scales: {
        x: { grid: { color: GRID }, ticks: { color: TICK, font: { size: 11 } } },
        y: { grid: { color: GRID }, ticks: { color: TICK, font: { size: 10 }, callback: v => '$' + (v >= 1000 ? Math.round(v/1000)+'k' : v) } }
      }
    }
  });

  // ── 4. CUOTAS PENDIENTES FUTURAS ──
  const cuotasFuturas = {};
  datos.forEach(d => {
    if (d.cuotaTotal <= 1 || d.cuotaActual === 0 || !d.fechaDate) return;
    const cuotasPendientes = d.cuotaTotal - d.cuotaActual;
    if (cuotasPendientes <= 0) return;

    const montoCuotaARS = d.montoARS;
    const montoCuotaUSD = d.montoUSD;

    for (let i = 1; i <= cuotasPendientes; i++) {
      const mesFuturo = addMonths(d.fechaDate, i);
      const key = `${mesFuturo.getFullYear()}-${String(mesFuturo.getMonth()+1).padStart(2,'0')}`;
      if (!cuotasFuturas[key]) {
        cuotasFuturas[key] = { label: mesLabel(mesFuturo), date: mesFuturo, totalARS: 0, totalUSD: 0, items: [] };
      }
      cuotasFuturas[key].totalARS += montoCuotaARS;
      cuotasFuturas[key].totalUSD += montoCuotaUSD;
      cuotasFuturas[key].items.push({
        tarjeta: d.tarjeta,
        detalle: d.detalle,
        cuotaNum: d.cuotaActual + i,
        cuotaTotal: d.cuotaTotal,
        montoARS: montoCuotaARS,
        montoUSD: montoCuotaUSD,
        color: colorMap[d.tarjeta] || '#fff'
      });
    }
  });

  const cuotasKeys = Object.keys(cuotasFuturas).sort();
  let cuotasHTML = '';
  if (cuotasKeys.length > 0) {
    const mesActualKey = `${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}`;
    cuotasHTML += `<p class="tc-seccion-titulo">Cuotas pendientes futuras</p><div class="tc-cuotas-grid">`;
    cuotasKeys.forEach(key => {
      const m = cuotasFuturas[key];
      const esActual = key === mesActualKey;
      cuotasHTML += `
        <div class="tc-cuota-mes ${esActual ? 'actual' : ''}">
          <p class="tc-cuota-mes-label">${m.label}${esActual ? ' · este mes' : ''}</p>
          <p class="tc-cuota-mes-ars">${m.totalARS > 0 ? fmt(m.totalARS) : '—'}</p>
          ${m.totalUSD > 0 ? `<p class="tc-cuota-mes-usd">${fmtUSD(m.totalUSD)}</p>` : ''}
        </div>`;
    });
    cuotasHTML += `</div>`;

    cuotasHTML += `
      <div class="table-card" style="margin-top:0;">
        <p class="chart-title">Detalle de cuotas pendientes</p>
        <div style="overflow-x:auto;">
        <table class="ranking-table" style="min-width:500px;">
          <thead><tr>
            <th>Mes</th><th>Tarjeta</th><th>Concepto</th>
            <th style="text-align:center">Cuota</th>
            <th style="text-align:right">ARS</th>
            <th style="text-align:right">USD</th>
          </tr></thead>
          <tbody>`;
    cuotasKeys.forEach(key => {
      const m = cuotasFuturas[key];
      const esActual = key === `${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}`;
      m.items.forEach(it => {
        cuotasHTML += `<tr style="${esActual ? 'background:#111;' : ''}">
          <td style="color:#555;font-size:12px;white-space:nowrap">${m.label}${esActual ? ' ←' : ''}</td>
          <td><span style="color:${it.color};font-size:12px;font-weight:500;">${it.tarjeta}</span></td>
          <td style="font-size:12px">${it.detalle}</td>
          <td style="text-align:center"><span class="cuota-tag ${esActual ? 'en-curso' : ''}">${it.cuotaNum}/${it.cuotaTotal}</span></td>
          <td style="text-align:right;font-size:12px">${it.montoARS > 0 ? fmt(it.montoARS) : '—'}</td>
          <td style="text-align:right;font-size:12px;color:#1D9E75">${it.montoUSD > 0 ? fmtUSD(it.montoUSD) : '—'}</td>
        </tr>`;
      });
    });
    cuotasHTML += `</tbody></table></div></div>`;
  }
  document.getElementById('tcCuotasPendientes').innerHTML = cuotasHTML;

  // ── 5. DETALLE COMPLETO DE CONSUMOS ──
  const detalleOrdenado = [...datos].sort((a,b) => {
    if (!a.vencDate && !b.vencDate) return 0;
    if (!a.vencDate) return 1;
    if (!b.vencDate) return -1;
    return a.vencDate - b.vencDate || a.tarjeta.localeCompare(b.tarjeta);
  });

  let detalleHTML = `
    <p class="tc-seccion-titulo">Todos los consumos</p>
    <div class="table-card" style="margin-top:0;">
      <div style="overflow-x:auto;">
      <table class="ranking-table" style="min-width:540px;">
        <thead><tr>
          <th>Fecha</th><th>Tarjeta</th><th>Concepto</th>
          <th style="text-align:center">Cuota</th>
          <th style="text-align:right">ARS</th>
          <th style="text-align:right">USD</th>
          <th style="text-align:right">Vencimiento</th>
        </tr></thead>
        <tbody>`;
  detalleOrdenado.forEach(d => {
    const color = colorMap[d.tarjeta] || '#fff';
    const cuotaTag = d.cuota
      ? `<span class="cuota-tag en-curso">${d.cuota}</span>`
      : `<span style="color:#333;font-size:11px;">—</span>`;
    const urg = localUrgenciaClass(d.vencDate);
    detalleHTML += `<tr>
      <td style="color:#555;font-size:12px;white-space:nowrap">${d.fecha}</td>
      <td><span style="color:${color};font-size:12px;font-weight:500;">${d.tarjeta}</span></td>
      <td style="font-size:12px">${d.detalle}</td>
      <td style="text-align:center">${cuotaTag}</td>
      <td style="text-align:right;font-size:12px">${d.montoARS > 0 ? fmt(d.montoARS) : '—'}</td>
      <td style="text-align:right;font-size:12px;color:#1D9E75">${d.montoUSD > 0 ? fmtUSD(d.montoUSD) : '—'}</td>
      <td style="text-align:right;font-size:12px" class="${urg}">${d.vencStr || '—'}</td>
    </tr>`;
  });
  detalleHTML += `</tbody></table></div></div>`;
  document.getElementById('tcDetalle').innerHTML = detalleHTML;

  function localUrgenciaClass(vencDate) {
    if (!vencDate) return '';
    const diff = Math.round((vencDate - hoy) / (1000*60*60*24));
    if (diff <= 3)  return 'tc-venc-fecha urgente';
    if (diff <= 7)  return 'tc-venc-fecha pronto';
    return '';
  }
}

// ─── COMPARATIVA ──────────────────────────────────────────────────────────────
function renderComparativa() {
  const parsed = CICLOS.map((c, i) => datosCache[i] ? { label: c.label, ciclo: c, ...parsearCiclo(datosCache[i]) } : null).filter(Boolean);
  if (parsed.length < 1) return;

  const labels   = parsed.map(p => p.label.replace('Ciclo ','').replace(' 2026',''));
  const totales  = parsed.map(p => Math.round(p.datos.reduce((s,r) => s + r.monto, 0)));
  const ingresos = parsed.map(p => p.ingresosLucas + p.ingresosMari);
  const ratios   = parsed.map((p,i) => ingresos[i] > 0 ? parseFloat(((totales[i] / ingresos[i]) * 100).toFixed(1)) : 0);

  if (compareBarInst) compareBarInst.destroy();
  compareBarInst = new Chart(document.getElementById('compareBarChart'), {
    type: 'bar',
    data: { labels, datasets: [
      { label: 'Gastos', data: totales, backgroundColor: labels.map((_, i) => parsed[i].label === CICLOS[cicloActivo].label ? '#378ADD' : '#378ADD44'), borderColor: '#378ADD', borderWidth: 1.5, borderRadius: 6 },
      { label: 'Ingresos', data: ingresos, type: 'line', borderColor: '#1D9E75', backgroundColor: 'transparent', borderWidth: 1.5, borderDash: [4,4], pointRadius: 4, pointBackgroundColor: '#1D9E75', tension: 0.3 }
    ]},
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: GRID }, ticks: { color: TICK, font: { size: 11 } } }, y: { grid: { color: GRID }, ticks: { color: TICK, font: { size: 10 }, callback: v => '$' + (v >= 1000000 ? Math.round(v/1000000)+'M' : v >= 1000 ? Math.round(v/1000)+'k' : v) } } } }
  });

  if (ratioLineInst) ratioLineInst.destroy();
  ratioLineInst = new Chart(document.getElementById('ratioLineChart'), {
    type: 'line',
    data: { labels, datasets: [{ label: '% gastado', data: ratios, borderColor: '#EF9F27', backgroundColor: '#EF9F2715', borderWidth: 2, pointRadius: 5, pointBackgroundColor: '#EF9F27', tension: 0.3, fill: true }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `${ctx.raw}% del ingreso` } } }, scales: { x: { grid: { color: GRID }, ticks: { color: TICK, font: { size: 11 } } }, y: { grid: { color: GRID }, ticks: { color: TICK, font: { size: 10 }, callback: v => v + '%' }, min: 0, max: 100 } } }
  });

  const allCats = [...new Set(parsed.flatMap(p => p.datos.map(d => d.categoria)))];
  const topCats = allCats.map(cat => ({ cat, total: parsed.reduce((s,p) => s + p.datos.filter(d => d.categoria === cat).reduce((ss,r) => ss + r.monto, 0), 0) })).sort((a,b) => b.total - a.total).slice(0, 5).map(x => x.cat);

  if (catCompareInst) catCompareInst.destroy();
  catCompareInst = new Chart(document.getElementById('catCompareChart'), {
    type: 'bar',
    data: { labels, datasets: topCats.map((cat, i) => ({ label: cat, data: parsed.map(p => Math.round(p.datos.filter(d => d.categoria === cat).reduce((s,r) => s + r.monto, 0))), backgroundColor: PALETTE[i] + '88', borderColor: PALETTE[i], borderWidth: 1.5, borderRadius: 4 })) },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { stacked: true, grid: { color: GRID }, ticks: { color: TICK, font: { size: 11 } } }, y: { stacked: true, grid: { color: GRID }, ticks: { color: TICK, font: { size: 10 }, callback: v => '$' + (v >= 1000 ? Math.round(v/1000)+'k' : v) } } } }
  });
  document.getElementById('catCompareLegend').innerHTML = topCats.slice(0,5).map((cat, i) =>
    `<span class="legend-item"><span class="legend-dot" style="background:${PALETTE[i]}"></span>${cat.split(' ')[0]}</span>`
  ).join('');

  document.getElementById('compareTable').innerHTML = `
    <thead><tr><th>Ciclo</th><th style="text-align:right">Ingresos</th><th style="text-align:right">Gastos</th><th style="text-align:right">Saldo</th><th style="text-align:right">%</th></tr></thead>
    <tbody>${parsed.map((p, i) => {
      const t = totales[i], ing = ingresos[i], s = ing - t, r = ratios[i];
      const isCurrent = p.label === CICLOS[cicloActivo].label;
      return `<tr style="${isCurrent ? 'color:#fff' : ''}">
        <td style="color:${isCurrent ? '#378ADD' : '#666'};font-size:12px">${labels[i]}</td>
        <td style="text-align:right">${fmt(ing)}</td>
        <td style="text-align:right;color:#E24B4A">${fmt(t)}</td>
        <td style="text-align:right;color:#639922">${fmt(s)}</td>
        <td style="text-align:right">${r}%</td>
      </tr>`;
    }).join('')}</tbody>`;
}

// ─── INICIO ───────────────────────────────────────────────────────────────────
buildDropdown();
loadData();
</script>
